<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Results</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1A1A2E; --teal: #4ECDC4; --teal-dark: #085041; --teal-light: #E1F5EE;
    --coral: #FF6B6B; --coral-dark: #4A1B0C; --coral-light: #FAECE7;
    --yellow: #FFD93D; --white: #FFFEF7; --gray: #f4f4f0; --muted: #888; --border: #e0e0d8;
    --shadow: 0 4px 24px rgba(26,26,46,0.10);
  }
  html, body { min-height: 100%; background: var(--gray); font-family: 'Nunito', sans-serif; color: var(--navy); }
  body { padding: 40px 24px; }

  .page { max-width: 760px; margin: 0 auto; }

  .top-bar { height: 8px; background: linear-gradient(90deg, #FF6B6B, #FFD93D, #4ECDC4, #9B5DE5); border-radius: 8px 8px 0 0; }

  .card { background: var(--white); border-radius: 0 0 24px 24px; box-shadow: var(--shadow); padding: 40px 48px; margin-bottom: 24px; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }

  h1 { font-family: 'Fredoka One', cursive; font-size: 34px; line-height: 1.1; }

  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #E1F5EE; border: 2px solid var(--teal-dark);
    border-radius: 50px; padding: 4px 14px;
    font-size: 13px; font-weight: 800; color: var(--teal-dark);
  }

  .live-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #1D9E75;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .total-line { font-size: 14px; font-weight: 700; color: var(--muted); margin-bottom: 36px; }
  .total-line strong { color: var(--navy); }

  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  .results-section { border: 2.5px solid var(--navy); border-radius: 16px; overflow: hidden; }

  .results-header { padding: 12px 18px; font-family: 'Fredoka One', cursive; font-size: 20px; }
  .results-header.boys { background: var(--teal-light); color: var(--teal-dark); }
  .results-header.girls { background: var(--coral-light); color: var(--coral-dark); }

  .result-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 18px; border-bottom: 1px solid var(--border);
    transition: background 0.3s;
  }
  .result-row:last-child { border-bottom: none; }
  .result-row.leader { background: var(--yellow); }

  .rname { font-size: 14px; font-weight: 800; min-width: 72px; }

  .rbar-wrap { flex: 1; height: 10px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .rbar { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
  .rbar.boy  { background: var(--teal); }
  .rbar.girl { background: var(--coral); }

  .rcount { font-size: 14px; font-weight: 800; min-width: 24px; text-align: right; }

  .winner-tag {
    font-size: 10px; font-weight: 800; letter-spacing: 0.5px;
    background: var(--navy); color: var(--yellow);
    padding: 2px 8px; border-radius: 6px; white-space: nowrap;
  }

  .no-votes { font-size: 14px; font-weight: 700; color: var(--muted); padding: 16px 18px; }

  .actions { display: flex; gap: 12px; margin-top: 32px; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; border: 2.5px solid var(--navy); transition: transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-ghost { background: transparent; color: var(--navy); border-color: var(--border); }
  .btn-ghost:hover { border-color: var(--navy); }
  .btn-danger { background: #cc2222; color: white; border-color: #cc2222; box-shadow: 3px 3px 0 #880000; }
  .btn-danger:hover { box-shadow: 5px 5px 0 #880000; }

  .voter-log { background: var(--white); border-radius: 24px; box-shadow: var(--shadow); padding: 32px 48px; }
  .voter-log h2 { font-family: 'Fredoka One', cursive; font-size: 22px; margin-bottom: 16px; }
  .voter-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .voter-chip { background: var(--gray); border: 1.5px solid var(--border); border-radius: 50px; padding: 5px 14px; font-size: 13px; font-weight: 700; }
  .voter-empty { font-size: 14px; font-weight: 700; color: var(--muted); }

  @media (max-width: 540px) {
    .card { padding: 28px 20px; }
    .results-grid { grid-template-columns: 1fr; }
    .voter-log { padding: 24px 20px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="top-bar"></div>
  <div class="card">
    <div class="header">
      <h1>Live Results</h1>
      <div class="live-badge"><div class="live-dot"></div> Live</div>
    </div>
    <div class="total-line" id="total-line">Waiting for votes...</div>

    <div class="results-grid">
      <div class="results-section">
        <div class="results-header boys">Boys</div>
        <div id="boys-results"><div class="no-votes">No votes yet</div></div>
      </div>
      <div class="results-section">
        <div class="results-header girls">Girls</div>
        <div id="girls-results"><div class="no-votes">No votes yet</div></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-danger" onclick="resetElection()">Reset all votes</button>
    </div>
  </div>

  <div class="voter-log">
    <h2>Who has voted</h2>
    <div class="voter-list" id="voter-list"><div class="voter-empty">No votes cast yet</div></div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDnGbxDJ0BCtNy0mT5lBU3W-RhkgT2-5QU",
    authDomain: "class-election-47ea3.firebaseapp.com",
    databaseURL: "https://class-election-47ea3-default-rtdb.firebaseio.com",
    projectId: "class-election-47ea3",
    storageBucket: "class-election-47ea3.firebasestorage.app",
    messagingSenderId: "531598379526",
    appId: "1:531598379526:web:0858dad6d21635401cd187"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const BOYS  = ['Aiden','Brayden','Jackson','Luke','Milo','Tucker','Ty','Waylon'];
  const GIRLS = ['Alexa','Ava','Colette','Ellowyn','KK','Kylie','Taegan'];

  let currentVotes  = { boys: {}, girls: {} };
  let currentVoters = [];

  // Listen to votes in real time
  onValue(ref(db, 'votes'), snapshot => {
    const data = snapshot.val() || { boys: {}, girls: {} };
    currentVotes = data;
    renderResults();
  });

  // Listen to voter log in real time
  onValue(ref(db, 'voters'), snapshot => {
    const data = snapshot.val();
    currentVoters = data ? Object.values(data).sort((a,b) => a.timestamp - b.timestamp) : [];
    renderVoterLog();
  });

  function renderResults() {
    const boyVotes  = currentVotes.boys  || {};
    const girlVotes = currentVotes.girls || {};

    const totalBoys  = BOYS.reduce((s, n)  => s + (boyVotes[n]  || 0), 0);
    const totalGirls = GIRLS.reduce((s, n) => s + (girlVotes[n] || 0), 0);
    const total = Math.max(totalBoys, totalGirls);

    document.getElementById('total-line').innerHTML =
      total === 0 ? 'Waiting for votes...' :
      '<strong>' + total + '</strong> vote' + (total !== 1 ? 's' : '') + ' cast';

    const sortedBoys  = [...BOYS].sort((a,b)  => (boyVotes[b]  || 0) - (boyVotes[a]  || 0));
    const sortedGirls = [...GIRLS].sort((a,b) => (girlVotes[b] || 0) - (girlVotes[a] || 0));

    const maxBoy  = Math.max(1, ...BOYS.map(n  => boyVotes[n]  || 0));
    const maxGirl = Math.max(1, ...GIRLS.map(n => girlVotes[n] || 0));

    const br = document.getElementById('boys-results');
    const gr = document.getElementById('girls-results');
    br.innerHTML = '';
    gr.innerHTML = '';

    sortedBoys.forEach((name, i) => {
      const c   = boyVotes[name] || 0;
      const pct = Math.round((c / maxBoy) * 100);
      const isLeader = i === 0 && c > 0;
      const row = document.createElement('div');
      row.className = 'result-row' + (isLeader ? ' leader' : '');
      row.innerHTML = `
        <span class="rname">${name}</span>
        <div class="rbar-wrap"><div class="rbar boy" style="width:${pct}%"></div></div>
        <span class="rcount">${c}</span>
        ${isLeader ? '<span class="winner-tag">LEADING</span>' : ''}
      `;
      br.appendChild(row);
    });

    sortedGirls.forEach((name, i) => {
      const c   = girlVotes[name] || 0;
      const pct = Math.round((c / maxGirl) * 100);
      const isLeader = i === 0 && c > 0;
      const row = document.createElement('div');
      row.className = 'result-row' + (isLeader ? ' leader' : '');
      row.innerHTML = `
        <span class="rname">${name}</span>
        <div class="rbar-wrap"><div class="rbar girl" style="width:${pct}%"></div></div>
        <span class="rcount">${c}</span>
        ${isLeader ? '<span class="winner-tag">LEADING</span>' : ''}
      `;
      gr.appendChild(row);
    });
  }

  function renderVoterLog() {
    const el = document.getElementById('voter-list');
    if (currentVoters.length === 0) {
      el.innerHTML = '<div class="voter-empty">No votes cast yet</div>';
      return;
    }
    el.innerHTML = currentVoters
      .map(v => `<div class="voter-chip">${v.name}</div>`)
      .join('');
  }

  async function resetElection() {
    if (!confirm('Reset ALL votes and voter records? This cannot be undone.')) return;
    await remove(ref(db, 'votes'));
    await remove(ref(db, 'voters'));
  }

  window.resetElection = resetElection;
</script>
</body>
</html>
